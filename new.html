<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WasteZero Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* Sidebar */
.sidebar{
  width:260px;
  background:rgba(0,0,0,0.7);
  padding:20px;
  overflow-y:auto;
}

.sidebar h2{
  margin-bottom:20px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
  transition:0.3s;
}

.sidebar button:hover{
  background:rgba(255,255,255,0.2);
}

/* Main */
.main{
  flex:1;
  padding:30px;
  overflow:auto;
}

.section{
  display:none;
}

/* Cards */
.card{
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

/* Inputs FIXED */
input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
}

input::placeholder,
textarea::placeholder{
  color:#ccc;
}

button.action{
  background:#00c6ff;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  cursor:pointer;
}

/* Stats Grid */
.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-bottom:30px;
}

.bar{
  background:#ffffff33;
  height:8px;
  border-radius:10px;
  margin:5px 0 15px;
}

.bar-fill{
  height:100%;
  border-radius:10px;
}

/* Dark mode */
.dark{
  background:#111 !important;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>WasteZero</h2>

  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('pickup')">Schedule Pickup</button>
  <button onclick="show('opportunities')">Opportunities</button>
  <button onclick="show('messages')">Messages</button>
  <button onclick="show('impact')">My Impact</button>

  <hr>

  <button onclick="show('profile')">My Profile</button>
  <button onclick="show('settings')">Settings</button>
  <button onclick="show('help')">Help & Support</button>

  <button onclick="toggleDark()">🌙 Dark Mode</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="section">
<h2 style="margin-bottom:20px;">Dashboard Overview</h2>

<div class="stats">
<div class="card"><h4>Total Pickups</h4><h2 id="totalPickups">0</h2></div>
<div class="card"><h4>Reward Points</h4><h2 id="totalPoints">0</h2></div>
<div class="card"><h4>CO₂ Saved</h4><h2 id="co2Saved">0 kg</h2></div>
<div class="card"><h4>Active Opportunities</h4><h2 id="activeOpps">0</h2></div>
</div>

<div class="card">
<h3>Recycling Breakdown</h3>

Plastic
<div class="bar"><div id="plasticBar" class="bar-fill" style="width:0%;background:#00c6ff;"></div></div>

Paper
<div class="bar"><div id="paperBar" class="bar-fill" style="width:0%;background:#00ff99;"></div></div>

Metal
<div class="bar"><div id="metalBar" class="bar-fill" style="width:0%;background:#ff9800;"></div></div>
</div>

<div class="card">
<h3>Recent Activity</h3>
<div id="recentActivity">No activity yet.</div>
</div>
</div>

<!-- PICKUP -->
<div id="pickup" class="section">
<div class="card">
<h2>Schedule Pickup</h2>

<input id="pickupDate" type="date">
<input id="pickupType" placeholder="Waste Type (Plastic/Paper/Metal)">
<textarea id="pickupAddress" placeholder="Pickup Address"></textarea>

<button class="action" onclick="schedulePickup()">Schedule Pickup</button>

<div id="pickupList"></div>
</div>
</div>

<!-- OPPORTUNITIES -->
<div id="opportunities" class="section">
<div class="card">
<h2>Community Opportunities</h2>
<div id="oppList"></div>
</div>
</div>

<!-- MESSAGES FIXED -->
<div id="messages" class="section">
<div class="card">
<h2>Messages</h2>

<textarea id="msgText" placeholder="Type your message..."></textarea>
<button class="action" onclick="sendMessage()">Send</button>

<div id="msgList"></div>
</div>
</div>

<!-- IMPACT -->
<div id="impact" class="section">
<div class="card">
<h2>My Impact</h2>
<div id="impactData"></div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">
<h2>My Profile</h2>
<input id="fullName" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="location" placeholder="Location">
<input id="skills" placeholder="Skills">
<button class="action" onclick="saveProfile()">Save Profile</button>
</div>
</div>

<!-- SETTINGS -->
<div id="settings" class="section">
<div class="card">
<h2>Change Password</h2>
<input type="password" id="oldPass" placeholder="Old Password">
<input type="password" id="newPass" placeholder="New Password">
<button class="action" onclick="changePassword()">Change Password</button>
<p id="passMsg"></p>
</div>
</div>

<!-- HELP FIXED -->
<div id="help" class="section">
<div class="card">
<h2>Help & Support</h2>

<textarea id="helpText" placeholder="Describe your issue clearly..."></textarea>
<button class="action" onclick="submitHelp()">Submit</button>

</div>
</div>

</div>

<script>

function show(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}
show("dashboard");

function toggleDark(){
document.body.classList.toggle("dark");
}

let pickups=JSON.parse(localStorage.getItem("pickups"))||[];
let points=parseInt(localStorage.getItem("points"))||0;

function schedulePickup(){
const p={
date:pickupDate.value,
type:pickupType.value,
address:pickupAddress.value
};

if(!p.date||!p.type||!p.address){
alert("Please fill all details");
return;
}

pickups.push(p);
localStorage.setItem("pickups",JSON.stringify(pickups));

points+=10;
localStorage.setItem("points",points);

renderPickups();
updateDashboard();

pickupDate.value="";
pickupType.value="";
pickupAddress.value="";
}

function renderPickups(){
pickupList.innerHTML="";
pickups.forEach(p=>{
pickupList.innerHTML+=`
<div class="card">
<b>Date:</b> ${p.date}<br>
<b>Type:</b> ${p.type}<br>
<b>Address:</b> ${p.address}
</div>`;
});
}
renderPickups();

let opportunities=[
{title:"Beach Cleanup",location:"Vizag",points:50,joined:false},
{title:"Recycling Camp",location:"Hyderabad",points:40,joined:false}
];

function renderOpp(){
oppList.innerHTML="";
opportunities.forEach((o,i)=>{
oppList.innerHTML+=`
<div class="card">
<b>${o.title}</b><br>
Location: ${o.location}<br>
Points: ${o.points}<br>
<button class="action" onclick="joinOpp(${i})">
${o.joined?"Joined":"Join"}
</button>
</div>`;
});
}
renderOpp();

function joinOpp(i){
if(!opportunities[i].joined){
opportunities[i].joined=true;
points+=opportunities[i].points;
localStorage.setItem("points",points);
updateDashboard();
}
renderOpp();
}

function sendMessage(){
if(!msgText.value) return;
msgList.innerHTML+=`<div class="card">${msgText.value}</div>`;
msgText.value="";
}

function updateDashboard(){
totalPickups.innerText=pickups.length;
totalPoints.innerText=points;
co2Saved.innerText=(points*0.5).toFixed(1)+" kg";
activeOpps.innerText=opportunities.filter(o=>o.joined).length;

let plastic=0,paper=0,metal=0;
pickups.forEach(p=>{
if(p.type.toLowerCase().includes("plastic"))plastic++;
if(p.type.toLowerCase().includes("paper"))paper++;
if(p.type.toLowerCase().includes("metal"))metal++;
});

let total=pickups.length||1;
plasticBar.style.width=(plastic/total*100)+"%";
paperBar.style.width=(paper/total*100)+"%";
metalBar.style.width=(metal/total*100)+"%";

recentActivity.innerHTML=
pickups.slice(-3).map(p=>`📦 ${p.type} pickup on ${p.date}<br>`).join("");

impactData.innerHTML=`
Total Pickups: ${pickups.length}<br>
Total Points: ${points}<br>
CO₂ Saved: ${(points*0.5).toFixed(1)} kg
`;
}
updateDashboard();

function saveProfile(){
const profile={
fullName:fullName.value,
email:email.value,
location:location.value,
skills:skills.value
};
localStorage.setItem("profile",JSON.stringify(profile));
alert("Profile Saved!");
}

(function(){
const saved=JSON.parse(localStorage.getItem("profile"));
if(saved){
fullName.value=saved.fullName;
email.value=saved.email;
location.value=saved.location;
skills.value=saved.skills;
}
})();

let storedPass="123456";
function changePassword(){
if(oldPass.value!==storedPass){
passMsg.innerText="Wrong old password!";
return;
}
storedPass=newPass.value;
passMsg.innerText="Password changed successfully!";
}

function submitHelp(){
if(!helpText.value)return;
alert("Support request submitted!");
helpText.value="";
}

</script>

</body>
</html>
